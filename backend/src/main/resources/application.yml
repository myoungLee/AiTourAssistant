# @author myoung
server:
  port: 8080

spring:
  application:
    name: aitour-backend
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://localhost:3306/aitour?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: young
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 10
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      password: young
      timeout: 2s
  ai:
    openai:
      base-url: https://www.micuapi.ai
      api-key: ${AI_API_KEY:}
      chat:
        completions-path: /v1/chat/completions
        options:
          model: gpt-5.4
          reasoning-effort: high

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

security:
  jwt:
    issuer: aitour
    secret: aitour-local-development-secret-must-be-32-bytes
    access-token-minutes: 120
    refresh-token-days: 14

mcp:
  mode: local
  external:
    base-url:
    timeout-seconds: 10
