# @author myoung
server:
  port: 8080

spring:
  application:
    name: aitour-backend
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:h2:mem:aitour;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 10
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

security:
  jwt:
    issuer: aitour
    secret: aitour-local-development-secret-must-be-32-bytes
    access-token-minutes: 120
    refresh-token-days: 14

ai:
  provider: openai-compatible
  base-url: https://www.micuapi.ai/v1
  api-key: ${AI_API_KEY:}
  model: gpt-5.4
  reasoning-effort: high
  timeout-seconds: 60
