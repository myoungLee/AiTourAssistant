# @author myoung
server:
  port: 8080

spring:
  application:
    name: aitour-backend
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:h2:mem:aitour;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 10
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2s
  ai:
    openai:
      base-url: https://www.micuapi.ai
      api-key: test-key
      chat:
        completions-path: /v1/chat/completions
        options:
          model: gpt-5.4
          reasoning-effort: high

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

security:
  jwt:
    issuer: aitour
    secret: aitour-local-development-secret-must-be-32-bytes
    access-token-minutes: 120
    refresh-token-days: 14

mcp:
  mode: local
  external:
    base-url:
    timeout-seconds: 10
